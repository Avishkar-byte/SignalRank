# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for code architecture design, code review, and debugging.
  No candidate data was fed to any LLM during the ranking step.
  Reasoning generation uses rule-based templates (no LLM API calls during ranking).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage hybrid pipeline with 9 surgical hardening upgrades. 
  (1) Dual retrieval via FAISS semantic search (all-MiniLM-L6-v2 embeddings) 
  and BM25 lexical search, fused with Reciprocal Rank Fusion to produce an 
  expanded 700-candidate pool. 
  (2) Cross-encoder re-ranking (ms-marco-MiniLM-L-6-v2) combined with 23 
  behavioral signal scores. The JD parser extracts hackathon hints to dynamically 
  adjust signal weights (emphasizing availability and recruiter response).
  Recency multipliers and skill-match bonuses are applied.
  Advanced honeypot detection uses 12 rules (6 HARD, 6 SOFT) with graduated
  penalties to catch fabricated timelines and skill contradictions.
  (3) Rule-based tiered reasoning generation with opener rotation.
  Total ranking runtime: <150s on CPU.

# ============================================================================
# Declarations
# ============================================================================
declarations:
